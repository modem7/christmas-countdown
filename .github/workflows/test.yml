name: Test image

on:
  push:
    paths:
      - Dockerfile
      - package.json
      - yarn.lock
      - .yarnrc.yml
      - pages/**
      - public/**
      - src/**
      - css/**
      - scripts/**
      - next.config.js
      - .github/workflows/test.yml
      - .github/scripts/test-countdown.js
  pull_request:
    paths:
      - Dockerfile
      - package.json
      - yarn.lock
      - .yarnrc.yml
      - pages/**
      - public/**
      - src/**
      - css/**
      - scripts/**
      - next.config.js
      - .github/workflows/test.yml
      - .github/scripts/test-countdown.js
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Build image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: christmas-countdown:test
          cache-from: type=gha,scope=test
          cache-to: type=gha,mode=max,scope=test

      - name: Start container
        run: docker run -d --name xmas -p 8080:8080 christmas-countdown:test

      - name: Wait for container to be healthy
        run: |
          for i in $(seq 1 30); do
            docker exec xmas curl -fsS http://localhost:8080/healthz && exit 0
            sleep 1
          done
          docker logs xmas
          exit 1

      - name: Check root path returns 200
        run: |
          status=$(curl -sS -o /dev/null -w '%{http_code}' http://localhost:8080/)
          [ "$status" = "200" ]

      - name: Check index page structure
        run: |
          set -eu
          html=$(curl -fsS http://localhost:8080/)
          echo "$html" | grep -qE '<title[^>]*>Yet Another Christmas Countdown!</title>'
          echo "$html" | grep -q 'class="countdown-container'
          echo "$html" | grep -q 'class="label"'

      - name: Check static assets are served
        run: |
          set -eu
          headers=$(curl -sS -o /dev/null -D - http://localhost:8080/favicon-32x32.png)
          echo "$headers" | grep -qE '^HTTP/[0-9.]+ 200'
          echo "$headers" | grep -qi '^content-type: *image/png'

      - name: Check gzip compression is applied to index.html
        run: |
          headers=$(curl -sS -H 'Accept-Encoding: gzip' -o /dev/null -D - http://localhost:8080/)
          echo "$headers" | grep -qi '^content-encoding: *gzip'

      - name: Check security headers are present
        run: |
          set -eu
          headers=$(curl -sS -o /dev/null -D - http://localhost:8080/)
          echo "$headers" | grep -qi '^x-content-type-options: *nosniff'
          echo "$headers" | grep -qi '^x-frame-options: *deny'
          echo "$headers" | grep -qi '^referrer-policy: *no-referrer'
          echo "$headers" | grep -qi '^content-security-policy:'

      - name: Check container runs as non-root
        run: |
          docker exec xmas whoami | grep -qv root
          docker exec xmas id | grep -q 'uid=101'

      - name: Check no sudo access
        run: docker exec xmas which sudo && exit 1 || true

      - name: Check no world-writable files
        run: |
          count=$(docker exec xmas find /usr/share/nginx/html -type f -perm /o+w | wc -l)
          [ "$count" -eq 0 ]

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Install Playwright package
        run: |
          npm init -y >/dev/null
          # Pinned exact version - the cache key below is keyed on this
          # version, and an unpinned install could silently resolve a
          # newer release whose browser binaries no longer match a
          # stale cache.
          # --legacy-peer-deps: this repo's own package.json (yarn-managed)
          # already carries a known eslint-config-airbnb/eslint peer
          # mismatch that yarn only warns about - npm's stricter resolver
          # refuses to install anything here at all without this flag.
          npm install --no-save --legacy-peer-deps playwright@1.61.1

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-1.61.1

      - name: Install Playwright OS dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Verify countdown shows the right phase for each date
        run: node .github/scripts/test-countdown.js http://localhost:8080

      - name: Stop container
        if: always()
        run: docker rm -f xmas || true
